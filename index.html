<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Cerámicos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="viewport">
    <img id="bg-room" src="img/habitaciones/sala.jpg" alt="Escenario virtual">

    <canvas id="floor-canvas"></canvas>
    <canvas id="wall-canvas"></canvas>

    <div class="controls">
        <button onclick="cambiarHabitacion('sala.jpg')">Sala</button>
        <button onclick="cambiarHabitacion('cocina.jpg')">Cocina</button>
        <button onclick="cambiarHabitacion('bano.jpg')">Baño</button>
        <button onclick="cambiarHabitacion('recamara.jpg')">Recámara</button>
    </div>

    <div class="mode-selector">
        <button class="btn-mode" onclick="setModo('piso')">Configurar Piso</button>
        <button class="btn-mode" onclick="setModo('pared')">Configurar Pared</button>
    </div>

    <div id="interactive-dots">
        <div id="p1" class="dot blue" style="top:70%; left:20%" data-point="0"></div>
        <div id="p2" class="dot blue" style="top:70%; left:80%" data-point="1"></div>
        </div>
</div>

<aside class="product-panel">
    <h3>Catálogo de Marcas</h3>
    <div class="filter-bar">
        <button onclick="mostrarProductos('todas')">Todas</button>
        <button onclick="mostrarProductos('nitropiso')">Nitropiso</button>
        <button onclick="mostrarProductos('daltile')">Daltile</button>
        <button onclick="mostrarProductos('vitromex')">Vitromex</button>
    </div>

    <div id="catalog-container" class="grid-layout">
        </div>
</aside>
    <script src="script.js?v=1.1"></script>
</body>
</html>
