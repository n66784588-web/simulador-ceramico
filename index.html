<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Cerámico PRO</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/gh/wanasit/canvas-perspective-transform@master/dist/perspective.min.js"></script>
</head>

<body>

<div id="main-container">

    <div id="viewport">
        <img id="bg-room" src="img/habitaciones/sala.jpg">

        <canvas id="floor-canvas"></canvas>
        <canvas id="wall-canvas"></canvas>

        <div class="dot blue" id="p1" style="left:20%; top:70%;"></div>
        <div class="dot blue" id="p2" style="left:80%; top:70%;"></div>
        <div class="dot blue" id="p3" style="left:90%; top:95%;"></div>
        <div class="dot blue" id="p4" style="left:10%; top:95%;"></div>

        <div class="dot red" id="p5" style="left:20%; top:20%;"></div>
        <div class="dot red" id="p6" style="left:80%; top:20%;"></div>
        <div class="dot red" id="p7" style="left:80%; top:60%;"></div>
        <div class="dot red" id="p8" style="left:20%; top:60%;"></div>

        <div class="mode-selector">
            <button id="btn-piso" class="active" onclick="setModo('piso')">PISO</button>
            <button id="btn-pared" onclick="setModo('pared')">PARED</button>
            <button onclick="rotarManual()" style="background:#555;">🔄 Rotar</button>
        </div>
    </div>

    <div class="side-panel">
        <h3>Habitaciones</h3>
        <div class="brand-filters">
            <button onclick="cambiarHabitacion('sala.jpg')">Sala</button>
            <button onclick="cambiarHabitacion('recamara.jpg')">Recámara</button>
            <button onclick="cambiarHabitacion('baño.jpg')">Baño</button>
            <button onclick="cambiarHabitacion('cocina.jpg')">Cocina</button>
        </div>

        <h3>Marcas</h3>
        <div class="brand-filters">
            <button onclick="mostrarProductos('todas')">Todas</button>
            <button onclick="mostrarProductos('daltile')">Daltile</button>
            <button onclick="mostrarProductos('vitromex')">Vitromex</button>
            <button onclick="mostrarProductos('nitropiso')">Nitropiso</button>
            <button onclick="mostrarProductos('mise')">Mise</button>
        </div>

        <h3>Catálogo</h3>
        <div id="productos-lista" class="grid-productos">
            </div>

        <button class="btn-cotizar">💰 Cotizar Proyecto</button>
    </div>

</div>

<script src="./script-v2.js" defer></script>
</body>
</html>
