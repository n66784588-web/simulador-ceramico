<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Cerámicos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="viewport">
        <img id="bg-room" src="img/habitaciones/sala.jpg" alt="Habitación">
        
        <canvas id="floor-canvas"></canvas>
        <canvas id="wall-canvas"></canvas>

        <div class="dot" id="p1" style="left: 20%; top: 70%;"></div>
        <div class="dot" id="p2" style="left: 80%; top: 70%;"></div>
        <div class="dot" id="p3" style="left: 90%; top: 90%;"></div>
        <div class="dot" id="p4" style="left: 10%; top: 90%;"></div>

        <div class="room-controls">
            <button onclick="cambiarHabitacion('sala.jpg')">Sala</button>
            <button onclick="cambiarHabitacion('bano.jpg')">Baño</button>
            <button onclick="cambiarHabitacion('cocina.jpg')">Cocina</button>
            <button onclick="cambiarHabitacion('terraza.jpg')">Terraza</button>
            <button onclick="cambiarHabitacion('fachada.jpg')">Fachada</button>
            <button onclick="cambiarHabitacion('recamara.jpg')">Recámara</button>
        </div>

        <div class="config-controls" style="position: absolute; bottom: 20px; left: 20px;">
            <button onclick="setModo('piso')">Configurar Piso</button>
            <button onclick="setModo('pared')">Configurar Muro</button>
        </div>
    </div>

    <aside class="catalog-panel">
        <div class="brand-filters">
            <button onclick="mostrarProductos('todas')">Todas</button>
            <button onclick="mostrarProductos('nitropiso')">Nitropiso</button>
            <button onclick="mostrarProductos('porcelanite')">Porcelanite</button>
            <button onclick="mostrarProductos('vitromex')">Vitromex</button>
            <button onclick="manualDaltile()">Daltile</button> <button onclick="mostrarProductos('benadresa')">Benadresa</button>
        </div>
        <div id="catalog-container"></div>
    </aside>
<script src="https://cdn.jsdelivr.net/npm/perspective-transform@1.1.3/dist/perspective-transform.min.js"></script>
    
    <script src="js/script.js"></script>
</body>
</html>
