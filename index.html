<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Cerámicos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="simulator-layout">
   <div class="viewport" id="viewport">
    <div class="room-selector">
        <button onclick="cambiarHabitacion('sala-vacia.jpg')">Sala</button>
        <button onclick="cambiarHabitacion('bano.jpg')">Baño</button>
        <button onclick="cambiarHabitacion('cocina.jpg')">Cocina</button>
        <button onclick="cambiarHabitacion('terraza.jpg')">Terraza</button>
        <button onclick="cambiarHabitacion('fachada.jpg')">Fachada</button>
        <button onclick="cambiarHabitacion('recamara.jpg')">Recámara</button>
    </div>

    <img src="img/habitaciones/sala-vacia.jpg" id="bg-room">
    <canvas id="floor-canvas"></canvas>

    <div class="dot" id="p1" style="top: 70%; left: 20%;"></div>
    <div class="dot" id="p2" style="top: 70%; left: 80%;"></div>
    <div class="dot" id="p3" style="top: 90%; left: 90%;"></div>
    <div class="dot" id="p4" style="top: 90%; left: 10%;"></div>
</div>

    <aside class="catalog">
        <div class="brand-filters">
            <button onclick="mostrarProductos('todas')">Todas</button>
            <button onclick="mostrarProductos('porcelanite')">Porcelanite</button>
            <button onclick="mostrarProductos('mise')">Mise</button>
            <button onclick="mostrarProductos('daltile')">Daltile</button>
            <button onclick="mostrarProductos('vitromex')">Vitromex</button>
            <button onclick="mostrarProductos('nitropiso')">Nitropiso</button>
        </div>
        <div class="selector-modo">
    <button onclick="modoEdicion='piso'">Configurar Piso</button>
    <button onclick="modoEdicion='muro'">Configurar Muro</button>
</div>
        <div id="catalog-container">
            </div>
    </aside>
</div>

<script src="js/script.js"></script>
   <script src="https://cdn.jsdelivr.net/gh/wanasit/perspective.js@master/dist/perspective.min.js"></script>
<script src="js/script.js"></script> 
</body>
</html>
