<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="main-container">

    <!-- VISOR -->
    <div id="viewport">

        <img id="bg-room" src="img/habitaciones/sala.jpg">

        <canvas id="floor-canvas"></canvas>
        <canvas id="wall-canvas"></canvas>

        <!-- 🔥 CAPA DE INTERACCION -->
        <div id="interaction-layer"></div>

        <!-- CONTROLES -->
        <div class="controls">
            <button onclick="cambiarHabitacion('sala.jpg')">Sala</button>
            <button onclick="cambiarHabitacion('cocina.jpg')">Cocina</button>
            <button onclick="cambiarHabitacion('bano.jpg')">Baño</button>
        </div>

        <div class="mode-selector">
            <button onclick="setModo('piso')">Piso</button>
            <button onclick="setModo('pared')">Pared</button>
        </div>

    </div>

    <!-- PANEL -->
    <div class="side-panel">
        <h3>Productos</h3>
        <div id="productos-lista"></div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
