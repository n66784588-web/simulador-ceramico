<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Cerámicos Profesional</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="main-container">
    <div id="viewport">
        <img id="bg-room" src="img/habitaciones/sala.jpg">
        
        <canvas id="floor-canvas"></canvas>
        <canvas id="wall-canvas"></canvas>

        <div class="controls">
            <button onclick="cambiarHabitacion('sala.jpg')">Sala</button>
            <button onclick="cambiarHabitacion('cocina.jpg')">Cocina</button>
            <button onclick="cambiarHabitacion('bano.jpg')">Baño</button>
            <button onclick="cambiarHabitacion('recamara.jpg')">recamara</button>
             <button onclick="cambiarHabitacion('terraza.jpg')">terraza</button>
            <button onclick="cambiarHabitacion('fachada.jpg')">fachada</button>


        </div>

        <div class="mode-selector">
            <button id="btn-piso" class="active" onclick="setModo('piso')">Editar Piso (Puntos Azules)</button>
            <button id="btn-pared" onclick="setModo('pared')">Editar Pared (Puntos Rojos)</button>
            <small style="color: white; margin-top: 5px;">Rueda del mouse: Cambiar tamaño de pieza</small>
        </div>

        <div id="p1" class="dot blue" style="top:70%; left:20%"></div>
        <div id="p2" class="dot blue" style="top:70%; left:80%"></div>
        <div id="p3" class="dot blue" style="top:90%; left:90%"></div>
        <div id="p4" class="dot blue" style="top:90%; left:10%"></div>

        <div id="p5" class="dot red" style="top:20%; left:30%"></div>
        <div id="p6" class="dot red" style="top:20%; left:70%"></div>
        <div id="p7" class="dot red" style="top:60%; left:70%"></div>
        <div id="p8" class="dot red" style="top:60%; left:30%"></div>
    </div>

    <div class="side-panel">
        <h3>Marcas</h3>
        <div class="brand-filters">
            <button onclick="mostrarProductos('todas')">Todas</button>
            <button onclick="mostrarProductos('nitropiso')">Nitropiso</button>
            <button onclick="mostrarProductos('porcelanite')">Porcelanite</button>
            <button onclick="mostrarProductos('vitromex')">Vitromex</button>
            <button onclick="mostrarProductos('daltile')">Daltile</button>
            <button onclick="mostrarProductos('mise')">Mise</button>
            <button onclick="mostrarProductos('benadresa')">Benadresa</button>
        </div>
        <div id="productos-lista">
            </div>
    </div>
</div>

<script src="script-v2.js"></script>
</body>
</html>
