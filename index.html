<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Cerámicos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="simulator-layout">
    <div class="viewport" id="viewport">
        <img src="img/habitaciones/sala-vacia.jpg" id="bg-room">
        <canvas id="floor-canvas"></canvas>

        <div class="dot" id="p1" style="top: 70%; left: 20%;"></div>
        <div class="dot" id="p2" style="top: 70%; left: 80%;"></div>
        <div class="dot" id="p3" style="top: 90%; left: 90%;"></div>
        <div class="dot" id="p4" style="top: 90%; left: 10%;"></div>
    </div>

    <aside class="catalog">
        <div class="brand-filters">
            <button onclick="mostrarProductos('todas')">Todas</button>
            <button onclick="mostrarProductos('porcelanite')">Porcelanite</button>
            <button onclick="mostrarProductos('mise')">Mise</button>
            <button onclick="mostrarProductos('daltile')">Daltile</button>
            <button onclick="mostrarProductos('vitromex')">Vitromex</button>
            <button onclick="mostrarProductos('nitropiso')">Nitropiso</button>
        </div>
        
        <div id="catalog-container">
            </div>
    </aside>
</div>

<script src="js/script.js"></script>
</body>
</html>
