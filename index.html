<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Cerámicos</title>
    <link rel="stylesheet" href="css/style.css"> 
</head>

<body>
    <div id="viewport">
        <img id="bg-room" src="img/habitaciones/sala.jpg" alt="Habitación">
        <canvas id="floor-canvas"></canvas>
        <canvas id="wall-canvas"></canvas>
        
        <div class="dot dot-floor" id="p1" style="left: 20%; top: 70%;"></div>
        <div class="dot dot-floor" id="p2" style="left: 80%; top: 70%;"></div>
        <div class="dot dot-floor" id="p3" style="left: 90%; top: 90%;"></div>
        <div class="dot dot-floor" id="p4" style="left: 10%; top: 90%;"></div>
    </div>

    <aside class="catalog-panel">
        <div class="brand-filters">
            <button onclick="mostrarProductos('todas')">Todas</button>
            <button onclick="mostrarProductos('porcelanite')">Porcelanite</button>
            <button onclick="mostrarProductos('vitromex')">Vitromex</button>
            <button onclick="mostrarProductos('nitropiso')">Nitropiso</button>
        </div>
        <div id="catalog-container"></div>
    </aside>

    <script src="https://unpkg.com/perspective-transform@1.1.3/dist/perspective-transform.min.js"></script>
    <script src="js/script.js"></script>
</body>
