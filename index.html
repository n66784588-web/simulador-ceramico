<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Cerámico</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="main-container">

    <!-- ================= VISOR ================= -->
    <div id="viewport">

        <!-- FONDO HABITACIÓN -->
        <img id="bg-room" src="img/habitaciones/sala.jpg">

        <!-- CANVAS -->
        <canvas id="floor-canvas"></canvas>
        <canvas id="wall-canvas"></canvas>

        <!-- PUNTOS PISO -->
        <div class="dot" id="p1" style="left:200px; top:500px;"></div>
        <div class="dot" id="p2" style="left:900px; top:500px;"></div>
        <div class="dot" id="p3" style="left:850px; top:650px;"></div>
        <div class="dot" id="p4" style="left:250px; top:650px;"></div>

        <!-- PUNTOS PARED -->
        <div class="dot red" id="p5" style="left:350px; top:200px;"></div>
        <div class="dot red" id="p6" style="left:750px; top:200px;"></div>
        <div class="dot red" id="p7" style="left:750px; top:400px;"></div>
        <div class="dot red" id="p8" style="left:350px; top:400px;"></div>

        <!-- ===== HABITACIONES (NO BORRADAS) ===== -->
        <div id="habitaciones">
            <button onclick="cambiarHabitacion('sala.jpg')">Sala</button>
            <button onclick="cambiarHabitacion('cocina.jpg')">Cocina</button>
            <button onclick="cambiarHabitacion('baño.jpg')">Baño</button>
            <button onclick="cambiarHabitacion('recamara.jpg')">Recámara</button>
            <button onclick="cambiarHabitacion('terraza.jpg')">Terraza</button>
            <button onclick="cambiarHabitacion('fachada.jpg')">Fachada</button>
        </div>

        <!-- CONTROLES -->
        <div id="controls">
            <button id="btn-piso" onclick="setModo('piso')">Editar Piso</button>
            <button id="btn-pared" onclick="setModo('pared')">Editar Pared</button>
        </div>

    </div>

    <!-- ================= PANEL ================= -->
    <div id="panel">

        <h3>Marcas</h3>

        <!-- ===== MARCAS (TODAS LAS TUYAS) ===== -->
        <button onclick="mostrarProductos('todas')">Todas</button>
        <button onclick="mostrarProductos('nitropiso')">Nitropiso</button>
        <button onclick="mostrarProductos('porcelanite')">Porcelanite</button>
        <button onclick="mostrarProductos('vitromex')">Vitromex</button>
        <button onclick="mostrarProductos('daltile')">Daltile</button>
        <button onclick="mostrarProductos('mise')">Mise</button>
        <button onclick="mostrarProductos('benadresa')">Benadresa</button>

        <!-- PRODUCTOS -->
        <div id="productos-lista"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
