<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Cerámico PRO</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="main-container">

    <div id="viewport">

        <img id="bg-room" src="img/habitaciones/sala.jpg">

        <canvas id="floor-canvas"></canvas>
        <canvas id="wall-canvas"></canvas>

        <!-- PUNTOS -->
        <div id="p1" class="dot blue" style="left:20%; top:70%"></div>
        <div id="p2" class="dot blue" style="left:80%; top:70%"></div>
        <div id="p3" class="dot blue" style="left:90%; top:90%"></div>
        <div id="p4" class="dot blue" style="left:10%; top:90%"></div>

        <div id="p5" class="dot red" style="left:30%; top:30%"></div>
        <div id="p6" class="dot red" style="left:70%; top:30%"></div>
        <div id="p7" class="dot red" style="left:70%; top:60%"></div>
        <div id="p8" class="dot red" style="left:30%; top:60%"></div>

        <div class="controls">
            <button onclick="rotarTextura()">🔄 Rotar</button>
        </div>

        <div class="mode-selector">
            <button onclick="setModo('piso')" class="active">PISO</button>
            <button onclick="setModo('pared')">PARED</button>
        </div>

    </div>

    <div class="side-panel">

        <h3>Habitaciones</h3>
        <div class="brand-filters">
            <button onclick="cambiarHabitacion('sala.jpg')">Sala</button>
            <button onclick="cambiarHabitacion('recamara.jpg')">Recámara</button>
            <button onclick="cambiarHabitacion('terraza.jpg')">Terraza</button>
            <button onclick="cambiarHabitacion('baño.jpg')">Baño</button>
            <button onclick="cambiarHabitacion('fachada.jpg')">Fachada</button>
            <button onclick="cambiarHabitacion('cocina.jpg')">Cocina</button>
        </div>

        <h3>Patrones</h3>
        <div class="brand-filters">
            <button onclick="setPatron('cuadricula')">Cuadrícula</button>
            <button onclick="setPatron('ladrillo')">Ladrillo</button>
            <button onclick="setPatron('desfase30')">30%</button>
            <button onclick="setPatron('espiga')">Espiga</button>
        </div>

        <h3>Marcas</h3>
        <div class="brand-filters">
            <button onclick="mostrarProductos('todas')">Todas</button>
            <button onclick="mostrarProductos('daltile')">Daltile</button>
            <button onclick="mostrarProductos('vitromex')">Vitromex</button>
            <button onclick="mostrarProductos('porcelanite')">Porcelanite</button>
            <button onclick="mostrarProductos('nitropiso')">Nitropiso</button>
            <button onclick="mostrarProductos('mise')">Mise</button>
            <button onclick="mostrarProductos('benadresa')">Benadresa</button>
        </div>

        <button onclick="calcularCotizacion()">💰 Cotizar</button>

        <div id="productos-lista"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
